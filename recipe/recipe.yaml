context:
  version: "6.11.0"
  maj_min: ${{ (version | split('.'))[:2] | join('.') }}

package:
  name: qt6-networkauth
  version: ${{ version }}

source:
  url: https://download.qt.io/official_releases/qt/${{ maj_min }}/${{ version }}/submodules/qtnetworkauth-everywhere-src-${{ version }}.tar.xz
  md5: c9b177069738bf61b43faea0f84d5e33

build:
  number: 1

requirements:
  build:
    - cmake
    - ninja
    - perl
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - if: build_platform != target_platform
      then: qt6-main ${{ version }}.*
  host:
    - qt6-main ${{ version }}.*
    - if: linux
      then:
        - libgl-devel
        - libegl-devel
        - libopengl-devel
  run:
    - qt6-main ${{ version }}.*
  run_exports:
    - ${{ pin_subpackage('qt6-networkauth', upper_bound='x.x') }}

tests:
  - script:
      - if: unix
        then:
          - test -d $PREFIX/include/qt6/QtNetworkAuth
          - test -f $PREFIX/lib/libQt6NetworkAuth${SHLIB_EXT}
        else:
          - if not exist %PREFIX%\\Library\\include\\qt6\\QtNetworkAuth exit 1
          - if not exist %PREFIX%\\Library\\lib\\Qt6NetworkAuth.lib exit 1
          - if not exist %PREFIX%\\Library\\bin\\Qt6NetworkAuth.dll exit 1

about:
  homepage: http://qt-project.org
  license: GPL-3.0-only
  license_file:
    - LICENSES/GPL-3.0-only.txt
    - LICENSES/BSD-3-Clause.txt
    - LICENSES/GFDL-1.3-no-invariants-only.txt
    - LICENSES/LicenseRef-Qt-Commercial.txt
  summary: Qt Network Authentication
  description: |
    Qt Network Authorization provides a set of APIs that enable Qt applications
    to obtain limited access to online accounts and HTTP services without
    exposing users' passwords.
  documentation: http://doc.qt.io/
  repository: https://github.com/qt/qtopcua

extra:
  recipe-maintainers:
    - hmaarrfk
    - conda-forge/qt-main
  feedstock-name: qt-networkauth
